<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant IA</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var apiUrl = params.get("apiUrl") || "";
      var siteId = params.get("siteId") || "";
      var title = params.get("title") || "Assistant IA";

      document.title = title;

      if (!apiUrl || !siteId) {
        document.body.innerHTML = "<p style='font-family:Arial,sans-serif;padding:16px;color:#0f172a'>Configuration du clavardage invalide.</p>";
        return;
      }

      var script = document.createElement("script");
      script.src = apiUrl.replace(/\/$/, "") + "/widget/chat-widget.js";
      script.onload = function () {
        window.WebactionChat.init({
          apiUrl: apiUrl,
          siteId: siteId,
          title: title
        });
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
