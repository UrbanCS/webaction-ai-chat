<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clavardage Agent Webaction</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    .sidebar, .main {
      padding: 20px;
    }
    .sidebar {
      border-right: 1px solid #cbd5e1;
      background: #ffffff;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #e2e8f0;
      color: #0f172a;
      font-size: 18px;
      line-height: 1;
    }
    .conversation-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .conversation-item {
      padding: 12px;
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: #ffffff;
      color: #0f172a;
      cursor: pointer;
    }
    .conversation-item.active {
      border-color: #0f766e;
      background: #dcfce7;
      color: #0f172a;
    }
    .messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
      max-height: 65vh;
      overflow-y: auto;
    }
    .message {
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 70%;
      white-space: pre-wrap;
    }
    .message.agent {
      align-self: flex-end;
      background: #0f766e;
      color: white;
    }
    .message.visitor {
      align-self: flex-start;
      background: #e2e8f0;
    }
    .message.system {
      align-self: center;
      background: #fef3c7;
    }
    .message.typing {
      align-self: flex-start;
      background: #e2e8f0;
      min-width: 54px;
    }
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #64748b;
      display: inline-block;
      animation: typing-bounce 1s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) {
      animation-delay: 0.15s;
    }
    .typing-dot:nth-child(3) {
      animation-delay: 0.3s;
    }
    .composer {
      display: flex;
      gap: 8px;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 10px 12px;
      box-sizing: border-box;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: #0f766e;
      color: white;
      cursor: pointer;
    }
    .secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    .status {
      margin-bottom: 16px;
      font-size: 14px;
    }
    .settings-menu {
      display: none;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .settings-menu.open {
      display: block;
    }
    .settings-option {
      width: 100%;
      border: none;
      background: #ffffff;
      color: #0f172a;
      text-align: left;
      padding: 12px 14px;
      border-radius: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .settings-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .settings-label-text {
      color: #0f172a;
    }
    .settings-state {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #475569;
    }
    .settings-icon {
      width: 18px;
      text-align: center;
      color: #94a3b8;
      font-size: 16px;
    }
    .settings-option.settings-option-disabled .settings-label-text {
      color: #94a3b8;
      text-decoration: line-through;
    }
    .settings-option.settings-option-disabled .settings-state {
      color: #94a3b8;
    }
    .settings-option + .settings-option {
      border-top: 1px solid #e2e8f0;
    }
    .settings-meta {
      color: #475569;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .message-label {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
      opacity: 0.8;
    }
    @keyframes typing-bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.45;
      }
      40% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid #cbd5e1;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="header">
        <h2>Clavardage Agent</h2>
        <div class="header-actions">
          <button class="icon-button" id="settingsToggle" title="Préférences">⚙</button>
          <button id="toggleAvailability">Passer en ligne</button>
        </div>
      </div>
      <div class="settings-menu" id="settingsMenu">
        <button class="settings-option" id="changeAgentName">
          <span class="settings-label"><span class="settings-label-text">Changer le nom d'usager</span></span>
          <span class="settings-state"><span class="settings-icon">✎</span></span>
        </button>
        <button class="settings-option" id="toggleSound">
          <span class="settings-label"><span class="settings-label-text">Son</span></span>
          <span class="settings-state"><span id="soundStatus">Activé</span><span class="settings-icon" id="soundIcon">🔊</span></span>
        </button>
      </div>
      <div class="settings-meta" id="agentNameMeta">Nom affiché : Agent Webaction</div>
      <div class="status" id="availabilityStatus">Chargement du statut agent...</div>
      <div class="conversation-list" id="conversationList"></div>
    </aside>
    <main class="main">
      <h2 id="conversationTitle">Sélectionnez une conversation</h2>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <textarea id="replyText" placeholder="Écrivez une réponse..."></textarea>
      </div>
      <div class="composer" style="margin-top: 8px;">
        <button id="sendReply">Envoyer</button>
        <button class="secondary" id="closeConversation">Fermer la conversation</button>
        <button class="secondary" id="deleteConversation">Supprimer</button>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var siteId = params.get("siteId") || "";
      var agentKey = params.get("key") || window.prompt("Entrez la clé du tableau de bord agent :");
      var activeConversationId = null;
      var activeConversation = null;
      var basePath = window.location.pathname.replace(/\/agent\/live-chat\.html$/, "");
      var preferencesKey = "webactionAgentPreferences";
      var hasInitializedNotifications = false;
      var notifiedMessageIds = {};
      var agentIsOnline = false;
      var typingTimer = null;
      var lastTypingState = false;
      var preferences = loadPreferences();

      function loadPreferences() {
        try {
          var stored = JSON.parse(window.localStorage.getItem(preferencesKey) || "{}");
          return {
            agentName: stored.agentName || "Agent Webaction",
            soundEnabled: stored.soundEnabled !== false
          };
        } catch (_error) {
          return {
            agentName: "Agent Webaction",
            soundEnabled: true
          };
        }
      }

      function savePreferences() {
        window.localStorage.setItem(preferencesKey, JSON.stringify(preferences));
      }

      function renderPreferences() {
        document.getElementById("agentNameMeta").textContent = "Nom affiché : " + preferences.agentName;
        var soundButton = document.getElementById("toggleSound");
        document.getElementById("soundStatus").textContent = preferences.soundEnabled ? "Activé" : "Désactivé";
        document.getElementById("soundIcon").textContent = preferences.soundEnabled ? "🔊" : "🔇";
        soundButton.classList.toggle("settings-option-disabled", !preferences.soundEnabled);
      }

      function playNotificationSound() {
        if (!preferences.soundEnabled) {
          return;
        }

        var audioContext = new (window.AudioContext || window.webkitAudioContext)();
        var oscillator = audioContext.createOscillator();
        var gainNode = audioContext.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
        gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.12);
      }

      function maybeNotifyForConversation(conversation) {
        if (!conversation || !conversation.messages || !conversation.messages.length) {
          return;
        }

        var latestMessage = conversation.messages[conversation.messages.length - 1];
        if (!latestMessage || latestMessage.senderType !== "visitor" || !latestMessage.id) {
          return;
        }

        if (!hasInitializedNotifications) {
          notifiedMessageIds[latestMessage.id] = true;
          return;
        }

        if (notifiedMessageIds[latestMessage.id]) {
          return;
        }

        notifiedMessageIds[latestMessage.id] = true;
        playNotificationSound();
      }

      function api(path, options) {
        var requestOptions = options || {};
        requestOptions.headers = Object.assign({}, requestOptions.headers || {}, {
          "Content-Type": "application/json",
          "x-agent-key": agentKey || "",
          "x-site-id": siteId || ""
        });

        return fetch(basePath + path, requestOptions).then(function (response) {
          return response.json().then(function (data) {
            if (!response.ok) {
              throw new Error(data.error || "La requête a échoué.");
            }

            return data;
          });
        });
      }

      function sendAvailabilityBeacon(available) {
        var url = new URL(basePath + "/agent/live-chat/availability", window.location.origin);
        if (agentKey) {
          url.searchParams.set("key", agentKey);
        }
        if (siteId) {
          url.searchParams.set("siteId", siteId);
        }

        var payload = JSON.stringify({
          available: available,
          siteId: siteId || undefined
        });

        if (navigator.sendBeacon) {
          navigator.sendBeacon(url.toString(), new Blob([payload], { type: "application/json" }));
          return;
        }

        fetch(url.toString(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: payload,
          keepalive: true
        }).catch(function () {
          return null;
        });
      }

      function updateTypingState(isTyping) {
        if (!activeConversationId || lastTypingState === Boolean(isTyping)) {
          return;
        }

        lastTypingState = Boolean(isTyping);

        api("/agent/live-chat/" + activeConversationId + "/typing", {
          method: "POST",
          body: JSON.stringify({ isTyping: lastTypingState })
        }).catch(function () {
          return null;
        });
      }

      function renderMessages(messages) {
        var container = document.getElementById("messages");
        container.innerHTML = "";

        messages.forEach(function (message) {
          var el = document.createElement("div");
          el.className = "message " + message.senderType;

          var label = document.createElement("div");
          label.className = "message-label";
          if (message.senderType === "agent") {
            label.textContent = message.senderName || preferences.agentName;
          } else if (message.senderType === "visitor") {
            label.textContent = message.senderName || activeConversation.visitorName || "Visiteur";
          } else {
            label.textContent = "Système";
          }

          var content = document.createElement("div");
          content.textContent = message.text;
          el.appendChild(label);
          el.appendChild(content);
          container.appendChild(el);
        });

        if (activeConversation && activeConversation.typing && activeConversation.typing.visitor) {
          var typingEl = document.createElement("div");
          typingEl.className = "message typing";

          var typingLabel = document.createElement("div");
          typingLabel.className = "message-label";
          typingLabel.textContent = activeConversation.visitorName || "Visiteur";

          var typingDots = document.createElement("div");
          typingDots.className = "typing-dots";
          typingDots.innerHTML =
            '<span class="typing-dot"></span>' +
            '<span class="typing-dot"></span>' +
            '<span class="typing-dot"></span>';

          typingEl.appendChild(typingLabel);
          typingEl.appendChild(typingDots);
          container.appendChild(typingEl);
        }

        container.scrollTop = container.scrollHeight;
      }

      function formatConversationStatus(status) {
        if (status === "open") {
          return "ouverte";
        }

        if (status === "closed") {
          return "fermée";
        }

        return status || "";
      }

      function renderConversationList(conversations) {
        var list = document.getElementById("conversationList");
        list.innerHTML = "";

        conversations
          .slice()
          .sort(function (a, b) {
            return new Date(b.updatedAt).getTime() - new Date(a.updatedAt).getTime();
          })
          .forEach(function (conversation) {
            var item = document.createElement("button");
            item.type = "button";
            item.className = "conversation-item" + (conversation.id === activeConversationId ? " active" : "");
            item.innerHTML =
              "<strong>" + (conversation.siteName || conversation.siteId) + "</strong><br>" +
              (conversation.visitorEmail || "Aucun courriel") + "<br>" +
              "Statut : " + formatConversationStatus(conversation.status);
            item.addEventListener("click", function () {
              loadConversation(conversation.id);
            });
            list.appendChild(item);
          });
      }

      function refreshConversations() {
        return api("/agent/live-chat/conversations").then(function (data) {
          agentIsOnline = Boolean(data.available);
          document.getElementById("availabilityStatus").textContent = data.available
            ? "Statut agent : En ligne"
            : "Statut agent : Hors ligne";
          document.getElementById("toggleAvailability").textContent = data.available
            ? "Passer hors ligne"
            : "Passer en ligne";
          (data.conversations || []).forEach(maybeNotifyForConversation);
          hasInitializedNotifications = true;
          renderConversationList(data.conversations || []);
          if (siteId && data.conversations && data.conversations.length) {
            document.title = "Clavardage Agent - " + (data.conversations[0].siteName || siteId);
          }
        });
      }

      function loadConversation(conversationId) {
        activeConversationId = conversationId;
        lastTypingState = false;

        api("/agent/live-chat/" + conversationId + "/messages").then(function (data) {
          activeConversation = data.conversation;
          document.getElementById("conversationTitle").textContent =
            (activeConversation.siteName || activeConversation.siteId) + " - " +
            (activeConversation.visitorEmail || "Aucun courriel");
          renderMessages(activeConversation.messages || []);
          refreshConversations();
        });
      }

      document.getElementById("toggleAvailability").addEventListener("click", function () {
        var currentlyOnline = document.getElementById("availabilityStatus").textContent.indexOf("En ligne") !== -1;
        api("/agent/live-chat/availability", {
          method: "POST",
          body: JSON.stringify({ available: !currentlyOnline, siteId: siteId || undefined })
        }).then(refreshConversations);
      });

      document.getElementById("sendReply").addEventListener("click", function () {
        var text = document.getElementById("replyText").value.trim();
        if (!activeConversationId || !text) {
          return;
        }

        updateTypingState(false);

        api("/agent/live-chat/" + activeConversationId + "/messages", {
          method: "POST",
          body: JSON.stringify({
            text: text,
            senderName: preferences.agentName
          })
        }).then(function () {
          document.getElementById("replyText").value = "";
          loadConversation(activeConversationId);
        });
      });

      document.getElementById("replyText").addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          document.getElementById("sendReply").click();
        }
      });

      document.getElementById("replyText").addEventListener("input", function (event) {
        var hasText = Boolean(event.target.value.trim());
        updateTypingState(hasText);

        if (typingTimer) {
          window.clearTimeout(typingTimer);
        }

        if (hasText) {
          typingTimer = window.setTimeout(function () {
            updateTypingState(false);
          }, 2500);
        }
      });

      document.getElementById("closeConversation").addEventListener("click", function () {
        if (!activeConversationId) {
          return;
        }

        api("/agent/live-chat/" + activeConversationId + "/close", {
          method: "POST"
        }).then(function () {
          updateTypingState(false);
          activeConversationId = null;
          activeConversation = null;
          document.getElementById("conversationTitle").textContent = "Sélectionnez une conversation";
          document.getElementById("messages").innerHTML = "";
          refreshConversations();
        });
      });

      document.getElementById("deleteConversation").addEventListener("click", function () {
        if (!activeConversationId) {
          return;
        }

        var confirmed = window.confirm("Voulez-vous vraiment supprimer ce clavardage ? Cette action est irréversible.");
        if (!confirmed) {
          return;
        }

        api("/agent/live-chat/" + activeConversationId, {
          method: "DELETE"
        }).then(function () {
          updateTypingState(false);
          activeConversationId = null;
          activeConversation = null;
          document.getElementById("conversationTitle").textContent = "Sélectionnez une conversation";
          document.getElementById("messages").innerHTML = "";
          refreshConversations();
        });
      });

      document.getElementById("settingsToggle").addEventListener("click", function () {
        document.getElementById("settingsMenu").classList.toggle("open");
      });

      document.getElementById("changeAgentName").addEventListener("click", function () {
        var nextName = window.prompt("Entrez le nom affiché pour l'agent :", preferences.agentName);
        if (!nextName || !nextName.trim()) {
          return;
        }

        preferences.agentName = nextName.trim();
        savePreferences();
        renderPreferences();
      });

      document.getElementById("toggleSound").addEventListener("click", function () {
        preferences.soundEnabled = !preferences.soundEnabled;
        savePreferences();
        renderPreferences();
      });

      renderPreferences();
      refreshConversations();
      setInterval(function () {
        refreshConversations();
        if (activeConversationId) {
          loadConversation(activeConversationId);
        }
      }, 4000);

      window.addEventListener("pagehide", function () {
        if (agentIsOnline) {
          sendAvailabilityBeacon(false);
        }
      });

      window.addEventListener("beforeunload", function () {
        if (agentIsOnline) {
          sendAvailabilityBeacon(false);
        }
      });
    })();
  </script>
</body>
</html>
